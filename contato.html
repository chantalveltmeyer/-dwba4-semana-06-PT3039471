<main class="container">
    <h1>Mande uma mensagem</h1>

    <form>

        <label>Nome</label>

        <input type="email">

        <label>Telefone (99) 99999-9999</label>

            <option>Reclamação</option>

        <label>Mensagem</label>

        <fieldset>
            <legend>Opções de Resposta</legend>

            <label>
                <input type="checkbox"> E-Mail
            </label>

            <label>
